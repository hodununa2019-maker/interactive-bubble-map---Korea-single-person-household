// ── 지도 초기화 ──────────────────────────────────────────────────────────
const map = L.map('map', { center: [36.5, 127.8], zoom: 7, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 18
}).addTo(map);

// ── 색상 함수 ────────────────────────────────────────────────────────────
function diffColor(diff) {
  // diff 범위: -60 ~ +60, 0=회색, 양수=파랑(청년), 음수=빨강(노년)
  const t = Math.max(-1, Math.min(1, diff / 55));
  if (t >= 0) {
    // 회색(0.5,0.6,0.65) → 파랑(0.15,0.40,0.95)
    const r = Math.round(128 - t * 89);
    const g = Math.round(154 - t * 103);
    const b = Math.round(166 + t * 76);
    return `rgb(${r},${g},${b})`;
  } else {
    const a = -t;
    // 회색 → 빨강(0.88, 0.17, 0.17)
    const r = Math.round(128 + a * 97);
    const g = Math.round(154 - a * 111);
    const b = Math.round(166 - a * 121);
    return `rgb(${r},${g},${b})`;
  }
}

// ── 버블 크기 ────────────────────────────────────────────────────────────
function bubbleRadius(total) {
  return Math.max(6, Math.sqrt(total / 1000) * 1.8);
}

// ── 마커 생성 ────────────────────────────────────────────────────────────
let allMarkers = [];
let currentFilter = 'all';

function passes(d) {
  if (currentFilter === 'all') return true;
  if (currentFilter === 'youth') return d.diff > 0;
  if (currentFilter === 'elderly') return d.diff < 0;
  if (currentFilter === 'balanced') return Math.abs(d.diff) < 10;
  return true;
}

function buildMarkers() {
  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers = [];

  RAW.forEach(d => {
    const coord = COORDS[d.region];
    if (!coord) return;
    if (!passes(d)) return;

    const r = bubbleRadius(d.total);
    const color = diffColor(d.diff);
    const opacity = 0.75;

    const circle = L.circleMarker([coord[0], coord[1]], {
      radius: r,
      fillColor: color,
      fillOpacity: opacity,
      color: 'rgba(255,255,255,0.3)',
      weight: 1
    });

    const diffLabel = d.diff > 0
      ? `<span style="color:#60a5fa">+${d.diff}%p (청년 우세)</span>`
      : d.diff < 0
        ? `<span style="color:#f87171">${d.diff}%p (노년 우세)</span>`
        : `<span style="color:#9ca3af">0%p (균형)</span>`;

    const badgeColor = d.diff > 0 ? 'rgba(59,130,246,0.25)' : d.diff < 0 ? 'rgba(220,38,38,0.25)' : 'rgba(100,116,139,0.25)';
    const badgeBorder = d.diff > 0 ? '#3b82f6' : d.diff < 0 ? '#dc2626' : '#64748b';

    const youthW = Math.min(100, d.youth_pct);
    const elderlyW = Math.min(100, d.elderly_pct);

    const popup = `
      <div class="popup-title">📍 ${d.region}</div>
      <div class="popup-row"><span class="popup-label">1인가구 총수</span><span class="popup-val">${d.total.toLocaleString()}가구</span></div>
      <div class="popup-row"><span class="popup-label">청년(20~39세)</span><span class="popup-val" style="color:#60a5fa">${d.youth.toLocaleString()}가구 (${d.youth_pct}%)</span></div>
      <div class="popup-row"><span class="popup-label">노년(65세↑)</span><span class="popup-val" style="color:#f87171">${d.elderly.toLocaleString()}가구 (${d.elderly_pct}%)</span></div>
      <div class="popup-bar-wrap">
        <div class="popup-bar-label">청년 비율</div>
        <div class="popup-bar-track"><div class="popup-bar-fill" style="width:${youthW}%;background:linear-gradient(90deg,#1d4ed8,#60a5fa)"></div></div>
        <div class="popup-bar-label">노년 비율</div>
        <div class="popup-bar-track"><div class="popup-bar-fill" style="width:${elderlyW}%;background:linear-gradient(90deg,#991b1b,#f87171)"></div></div>
      </div>
      <div><span class="popup-diff-badge" style="background:${badgeColor};border:1px solid ${badgeBorder}">차이: ${diffLabel}</span></div>
    `;
    circle.bindPopup(popup, { maxWidth: 260 });

    // hover tooltip
    circle.on('mouseover', function() {
      this.setStyle({ weight: 2, color: 'rgba(255,255,255,0.7)' });
    });
    circle.on('mouseout', function() {
      this.setStyle({ weight: 1, color: 'rgba(255,255,255,0.3)' });
    });

    circle.addTo(map);
    allMarkers.push(circle);
  });
}

buildMarkers();

// ── 필터 버튼 ────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    buildMarkers();
  });
});
</script>
